<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="detail-container" class="diary-content">
        <p style="color: #fff; text-align: center;">読み込み中...</p>
    </main>

    <script>
        // ==========================================
        // あなたのmicroCMSの情報に書き換えてください
        // ==========================================
        const serviceId = 'gyobu';
        const endpoint  = 'posts';
        const apiKey    = 'lx9FPrqyNhcjc4Y9e8hmaLrx2q6sL7mwijEr';

        function getCharCount(htmlString) {
            if (!htmlString) return 0;
            const tmp = document.createElement('div');
            tmp.innerHTML = htmlString;
            return tmp.textContent.replace(/\s+/g, '').length;
        }

        // URLから「記事のID」と「どこから来たか(from)」を受け取る
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        const fromPage = urlParams.get('from'); // ▼ ここを追加 ▼

        async function fetchDiaryDetail() {
            try {
                const response = await fetch(`https://${serviceId}.microcms.io/api/v1/${endpoint}/${postId}`, {
                    headers: { 'X-MICROCMS-API-KEY': apiKey }
                });
                const post = await response.json();
                
                const dateObj = new Date(post.date);
                const formattedDate = `${dateObj.getFullYear()}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${String(dateObj.getDate()).padStart(2, '0')}`;
                
                // ==========================================
                // ▼ 戻るボタンのリンク先を判定する処理 ▼
                // ==========================================
                let backLinkUrl = 'diary-list.html';
                let backLinkText = '戻る';
                
                if (fromPage === 'home') {
                    // ホーム画面から来た場合は、完全にホームへ戻す
                    backLinkUrl = 'index.html';
                    backLinkText = '戻る';
                } else if (post.genre) {
                    // それ以外（一覧から来た場合など）は、そのジャンルの一覧に戻す
                    const genreName = Array.isArray(post.genre) ? post.genre[0] : post.genre;
                    backLinkUrl = `diary-list.html?genre=${encodeURIComponent(genreName)}`;
                    backLinkText = `${genreName}戻る`;
                }
                
                // 文字数を計算する
                const charCount = getCharCount(post.content);

                const container = document.getElementById('detail-container');
                container.innerHTML = `
                    <h1><span class="icon"></span> ${post.title}</h1>
                    
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px; margin-bottom: 20px;">
                        <p style="color: #a0a0a0; font-size: 14px; margin: 0;">${formattedDate}</p>
                        <p style="color: #a0a0a0; font-size: 14px; margin: 0;">${charCount}文字</p>
                    </div>
                    
                    ${post.image ? `<img src="${post.image.url}" alt="${post.title}">` : ''}
                    
                    <div style="color: #d0d0d0; line-height: 1.8; margin-top: 20px;">
                        ${post.content}
                    </div>
                    
                    <a href="${backLinkUrl}" class="back-link">← ${backLinkText}</a>
                `;
            } catch (error) {
                document.getElementById('detail-container').innerHTML = '<p style="color: red;">読み込みに失敗しました。</p>';
                console.error(error);
            }
        }

        if (postId) {
            fetchDiaryDetail();
        } else {
            document.getElementById('detail-container').innerHTML = '<p style="color: red;">記事が見つかりません。</p>';
        }
    </script>
</body>
</html>
