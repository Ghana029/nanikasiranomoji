<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日記の詳細</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="detail-container" class="diary-content">
        <p style="color: #fff; text-align: center;">読み込み中...</p>
    </main>

    <script>
        // ==========================================
        // 1. 先ほどと同じあなたの情報に書き換えてください
        // ==========================================
        const serviceId = 'gyobu';
        const endpoint  = 'posts';
        const apiKey    = 'lx9FPrqyNhcjc4Y9e8hmaLrx2q6sL7mwijEr';

        // ==========================================
        // 2. URLから「どの日記を開いたか」のIDを受け取る
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        // ==========================================
        // 3. microCMSから「そのIDの日記だけ」を取得して表示する
        // ==========================================
        async function fetchDiaryDetail() {
            try {
                // 先ほどのURLの末尾に /${postId} を足すことで1件だけ取得できます
                const response = await fetch(`https://${serviceId}.microcms.io/api/v1/${endpoint}/${postId}`, {
                    headers: { 'X-MICROCMS-API-KEY': apiKey }
                });
                const post = await response.json();
                
                // 日付の整形
                const dateObj = new Date(post.date);
                const formattedDate = `${dateObj.getFullYear()}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${String(dateObj.getDate()).padStart(2, '0')}`;
                
                // 画面に表示するHTMLを組み立てる
                const container = document.getElementById('detail-container');
                container.innerHTML = `
                    <h1><span class="icon">📄</span> ${post.title}</h1>
                    <p style="color: #a0a0a0; font-size: 14px;">${formattedDate}</p>
                    
                    ${post.image ? `<img src="${post.image.url}" alt="${post.title}">` : ''}
                    
                    <div style="color: #d0d0d0; line-height: 1.8; margin-top: 20px;">
                        ${post.content}
                    </div>
                    
                    <a href="diary-list.html" class="back-link">← 一覧に戻る</a>
                `;
            } catch (error) {
                document.getElementById('detail-container').innerHTML = '<p style="color: red;">読み込みに失敗しました。</p>';
                console.error(error);
            }
        }

        // IDがちゃんと受け取れていたら処理をスタート
        if (postId) {
            fetchDiaryDetail();
        } else {
            document.getElementById('detail-container').innerHTML = '<p style="color: red;">記事が見つかりません。</p>';
        }
    </script>
</body>
</html>
